<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR IPTV - المباريات</title>
<style>
*{box-sizing:border-box;font-family:sans-serif;}
body{margin:0;background:#0f0f0f;color:white;padding-top:60px;}
.topbar{background:#111;padding:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;position: fixed;top:0;width:100%;z-index:9999;}
.topbar span{font-weight:bold;}
.days{display:flex;justify-content:center;margin:10px;gap:10px;}
.daybtn{background:#1a1a1a;color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;}
.daybtn.active{background:#2a8fb8;}
.league-title{background:#ff4d4d;padding:12px;margin-top:15px;font-weight:bold;font-size:18px;border-right:4px solid #4da6ff;display:flex;align-items:center;gap:8px;box-shadow:0 2px 5px rgba(0,0,0,0.5);}
.league-flag{width:24px;height:16px;}
.match{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #222;}
.team{display:flex;flex-direction:column;align-items:center;width:90px;text-align:center;}
.team img{width:32px;height:32px;}
.time{font-weight:bold;font-size:16px;display:flex;align-items:center;gap:6px;}
.live-dot{width:10px;height:10px;background:#0f0;border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}
.big-match{background:#1a1a1a;border-left:4px solid gold;}
.watch-btn{background:#2a8fb8;color:white;border:none;padding:5px 10px;border-radius:6px;margin-top:4px;cursor:pointer;font-size:12px;}
.progress-container{background:#333;width:100%;height:6px;border-radius:3px;margin-top:4px;}
.progress-bar{background:#0f0;height:100%;border-radius:3px;width:0%;}
.countdown{font-size:12px;color:#aaa;margin-top:2px;}
</style>
</head>
<body>
<div class="topbar">
    <span>⚽ كل المباريات</span>
    <span id="clock"></span>
</div>
<div class="days">
    <button class="daybtn" onclick="changeDay(-1,this)">أمس</button>
    <button class="daybtn active" onclick="changeDay(0,this)">اليوم</button>
    <button class="daybtn" onclick="changeDay(1,this)">غداً</button>
</div>
<div id="matches"></div>

<script>
const API_KEY="6aa64b17ec50241e04924a18a8048d12";
const container=document.getElementById("matches");
let currentOffset=0;
const leagues={
    217:{name:"الدوري الجزائري", flag:"https://flagcdn.com/dz.svg"},
    39:{name:"الدوري الإنجليزي", flag:"https://flagcdn.com/gb.svg"},
    140:{name:"الدوري الإسباني", flag:"https://flagcdn.com/es.svg"},
    135:{name:"الدوري الإيطالي", flag:"https://flagcdn.com/it.svg"},
    78:{name:"الدوري الألماني", flag:"https://flagcdn.com/de.svg"},
    61:{name:"الدوري الفرنسي", flag:"https://flagcdn.com/fr.svg"},
    233:{name:"الدوري المصري", flag:"https://flagcdn.com/eg.svg"},
    307:{name:"الدوري السعودي", flag:"https://flagcdn.com/sa.svg"},
    203:{name:"الدوري التركي", flag:"https://flagcdn.com/tr.svg"}
};
let leagueOrder=[217,39,140,135,78,61,233,307,203];
const bigTeams=["Real Madrid","Barcelona","Manchester City","Liverpool","Manchester United","Arsenal","Chelsea","Bayern Munich","Juventus","Inter","Milan"];
let liveMatches=[];

function clock(){
    const now=new Date();
    document.getElementById("clock").innerText=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}
setInterval(clock,1000); clock();

function changeDay(offset,btn){
    currentOffset=offset;
    document.querySelectorAll(".daybtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadMatches();
}

function getElapsedTime(fixtureDate){
    const now=new Date();
    const diff=Math.max(0, Math.floor((now-fixtureDate)/60000));
    const hours=Math.floor(diff/60);
    const minutes=diff%60;
    return hours>0?`${hours}:${minutes.toString().padStart(2,'0')}`:`${minutes}′`;
}

function getCountdown(fixtureDate){
    const now=new Date();
    const diff=Math.floor((fixtureDate-now)/1000);
    if(diff<=0) return "تبدا الآن";
    const h=Math.floor(diff/3600);
    const m=Math.floor((diff%3600)/60);
    const s=diff%60;
    return `${h>0?h+"س ":""}${m>0?m+"د ":""}${s}s`;
}

function updateLiveMatches(){
    liveMatches.forEach(item=>{
        const matchTime=item.element.querySelector(".time span.elapsed");
        const progressBar=item.element.querySelector(".progress-bar");
        if(matchTime && progressBar){
            const elapsed=Math.floor((new Date()-item.date)/60000);
            matchTime.innerText=`${elapsed}′`;
            const percent=Math.min((elapsed/90)*100,100);
            progressBar.style.width=`${percent}%`;
        }
    });
}
setInterval(updateLiveMatches,1000);

async function loadMatches(){
    const date=new Date();
    date.setDate(date.getDate()+currentOffset);
    const today=date.toISOString().split('T')[0];
    container.innerHTML="جاري تحميل المباريات...";
    liveMatches=[];
    try{
        const res=await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`,{
            method:"GET",
            headers:{"x-apisports-key":API_KEY}
        });
        const data=await res.json();
        container.innerHTML="";
        let grouped={};
        leagueOrder.forEach(id=>grouped[id]=[]);
        data.response.sort((a,b)=>{
            if(a.fixture.status.short==="LIVE") return -1;
            if(b.fixture.status.short==="LIVE") return 1;
            return new Date(a.fixture.date)-new Date(b.fixture.date);
        });
        data.response.forEach(match=>{
            if(!leagues[match.league.id]) return;
            grouped[match.league.id].push(match);
        });

        leagueOrder.forEach(leagueId=>{
            const title=document.createElement("div");
            title.className="league-title";
            title.innerHTML=`<img class="league-flag" src="${leagues[leagueId].flag}"> ${leagues[leagueId].name}`;
            container.appendChild(title);
            if(grouped[leagueId].length===0){
                const empty=document.createElement("div");
                empty.style.textAlign="center";empty.style.color="#ccc";empty.style.padding="6px";
                empty.innerText="لا توجد مباريات لهذا الدوري";container.appendChild(empty);
            } else {
                grouped[leagueId].forEach(async match=>{
                    const home=match.teams.home;const away=match.teams.away;
                    const fixtureDate=new Date(match.fixture.date);
                    const status=match.fixture.status.short;
                    let timeDisplay="";
                    let progressHTML="";
                    let countdownHTML="";

                    if(status==="LIVE"){
                        timeDisplay=`<span class='live-dot'></span><span class='elapsed'>${getElapsedTime(fixtureDate)}</span>`;
                        progressHTML=`<div class='progress-container'><div class='progress-bar'></div></div>`;
                    } else if(status==="FT" || currentOffset<0){
                        timeDisplay=`<span>${match.goals.home}-${match.goals.away}</span>`;
                    } else {
                        const diffMin=Math.floor((fixtureDate-new Date())/60000);
                        if(diffMin<=60){
                            countdownHTML=`<div class="countdown">⏳ ${getCountdown(fixtureDate)}</div>`;
                        }
                        timeDisplay=`<span>${fixtureDate.toLocaleTimeString("ar-DZ",{hour:"2-digit",minute:"2-digit",hour12:false})}</span>`;
                    }

                    // القنوات الناقلة
                    let tv="";
                    try{
                        const tvRes = await fetch(`https://v3.football.api-sports.io/fixtures/${match.fixture.id}/tv`,{
                            method:"GET",
                            headers:{"x-apisports-key":API_KEY}
                        });
                        const tvData = await tvRes.json();
                        if(tvData.response && tvData.response.length>0){
                            tv = `<div style="font-size:11px;color:#aaa;margin-top:3px">📺 ${tvData.response.map(c=>c.name).join(" - ")}</div>`;
                        }
                    }catch(err){}

                    const row=document.createElement("div");
                    row.className=`match ${bigTeams.includes(home.name)||bigTeams.includes(away.name)?"big-match":""}`;
                    row.innerHTML=`
                        <div class="team"><img src="${home.logo}"><div>${home.name}</div></div>

                        <div class="time-container">
                            <div class="time">${timeDisplay}</div>
                            ${progressHTML}
                            ${countdownHTML}
                            ${tv}
                            <button class="watch-btn">مشاهدة</button>
                        </div>

                        <div class="team"><img src="${away.logo}"><div>${away.name}</div></div>
                    `;
                    container.appendChild(row);
                    if(status==="LIVE") liveMatches.push({element:row,date:fixtureDate});
                });
            }
        });
    } catch(e){container.innerHTML="<p style='text-align:center'>حدث خطأ في جلب المباريات</p>";console.error(e);}
}
loadMatches();
</script>
</body>
</html>
